version: "2"

run:
  timeout: 5m

linters:
  enable:
    # Correctness
    - govet
    - staticcheck
    - errcheck
    - errorlint
    - nilerr

    # Code quality
    - gocyclo
    - goconst

    # Style
    - revive
    - unconvert
    - whitespace

    # Security
    - gosec

    # Modern Go (requires Go 1.22+)
    - intrange

  settings:
    gocyclo:
      min-complexity: 15
    gosec:
      excludes:
        - G104
    revive:
      rules:
        - name: exported
          arguments: [checkPrivateReceivers, disableStutteringCheck]
    errorlint:
      errorf: true
      asserts: true
      comparison: true

  exclusions:
    rules:
      - path: "_test\\.go"
        linters: [gosec, gocyclo, errcheck, errorlint, goconst]
      - path: "internal/infrastructure/postgres/product/sqlc/"
        linters: [govet, staticcheck, errcheck, revive, goconst]

formatters:
  enable:
    - goimports

issues:
  max-same-issues: 20
