name: Deploy

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Semver of the version to deploy (e.g. 0.1.0)"
        required: true
      environment:
        description: "Target environment name"
        required: true
      deployment_id:
        description: "Leonis deployment ID (UUID) for status callback"
        required: true
      image_url:
        description: "Full Artifact Registry image URL to deploy"
        required: true
      cloud_run_service:
        description: "Cloud Run service name (e.g. leonis-d19e0b61)"
        required: true
      gcp_project:
        description: "GCP project ID"
        required: true
      gcp_region:
        description: "GCP region (e.g. us-central1)"
        required: true
      database_url:
        description: "DATABASE_URL to inject into the Cloud Run service (optional)"
        required: false
        default: ""

jobs:
  deploy:
    name: Deploy ${{ github.event.inputs.version }} to ${{ github.event.inputs.environment }}
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Deploy to Cloud Run
        env:
          DATABASE_URL: ${{ github.event.inputs.database_url }}
        run: |
          EXTRA_FLAGS=""
          if [ -n "$DATABASE_URL" ]; then
            python3 -c "import os, yaml; yaml.dump({'DATABASE_URL': os.environ['DATABASE_URL']}, open('/tmp/env_vars.yaml', 'w'))"
            EXTRA_FLAGS="--env-vars-file /tmp/env_vars.yaml"
          fi
          gcloud run deploy "${{ github.event.inputs.cloud_run_service }}" \
            --image "${{ github.event.inputs.image_url }}" \
            --region "${{ github.event.inputs.gcp_region }}" \
            --project "${{ github.event.inputs.gcp_project }}" \
            --platform managed \
            --quiet \
            $EXTRA_FLAGS

      - name: Notify Leonis (success)
        if: success()
        run: |
          curl -sf -X POST \
            "${{ secrets.LEONIS_API_URL }}/api/v1/deployments/${{ github.event.inputs.deployment_id }}/deploy-status" \
            -H "Content-Type: application/json" \
            -H "X-Build-Token: ${{ secrets.BUILD_TOKEN }}" \
            -d '{"status":"SUCCESS"}'

      - name: Notify Leonis (failure)
        if: failure()
        run: |
          curl -sf -X POST \
            "${{ secrets.LEONIS_API_URL }}/api/v1/deployments/${{ github.event.inputs.deployment_id }}/deploy-status" \
            -H "Content-Type: application/json" \
            -H "X-Build-Token: ${{ secrets.BUILD_TOKEN }}" \
            -d '{"status":"FAILED"}'
