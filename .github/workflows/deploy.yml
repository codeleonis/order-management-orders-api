name: Deploy

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Semver of the version to deploy (e.g. 0.1.0)"
        required: true
      environment:
        description: "Target environment name"
        required: true
      deployment_id:
        description: "Leonis deployment ID (UUID) for status callback"
        required: true

jobs:
  deploy:
    name: Deploy ${{ github.event.inputs.version }} to ${{ github.event.inputs.environment }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build
        run: go build ./...

      - name: Deploy
        run: |
          echo "Deploying version ${{ github.event.inputs.version }} to ${{ github.event.inputs.environment }}"
          # TODO: replace with actual deploy steps (Cloud Run, GKE, etc.)

      - name: Notify Leonis (success)
        if: success()
        run: |
          curl -sf -X POST \
            "${{ secrets.LEONIS_API_URL }}/api/v1/deployments/${{ github.event.inputs.deployment_id }}/deploy-status" \
            -H "Content-Type: application/json" \
            -H "X-Build-Token: ${{ secrets.BUILD_TOKEN }}" \
            -d '{"status":"SUCCESS"}'

      - name: Notify Leonis (failure)
        if: failure()
        run: |
          curl -sf -X POST \
            "${{ secrets.LEONIS_API_URL }}/api/v1/deployments/${{ github.event.inputs.deployment_id }}/deploy-status" \
            -H "Content-Type: application/json" \
            -H "X-Build-Token: ${{ secrets.BUILD_TOKEN }}" \
            -d '{"status":"FAILED"}'
