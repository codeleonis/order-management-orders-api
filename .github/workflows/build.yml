name: Build

on:
  workflow_dispatch:
    inputs:
      version_id:
        description: "Leonis version ID (UUID)"
        required: true
      semver:
        description: "Semantic version (e.g. 0.1.0)"
        required: true
      branch:
        description: "Branch to build from"
        required: true
      commit_sha:
        description: "Commit SHA to build"
        required: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    name: Build ${{ github.event.inputs.semver }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.commit_sha }}

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.event.inputs.semver }}

      - name: Create GitHub Release
        if: success()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "v${{ github.event.inputs.semver }}" \
            --target "${{ github.event.inputs.commit_sha }}" \
            --title "v${{ github.event.inputs.semver }}" \
            --notes "Docker image: \`ghcr.io/${{ github.repository }}:${{ github.event.inputs.semver }}\`"

      - name: Notify Leonis — READY
        if: success()
        run: |
          curl -s -f -X POST "${{ secrets.LEONIS_API_URL }}/api/v1/service-versions/${{ github.event.inputs.version_id }}/build-status" \
            -H "Content-Type: application/json" \
            -H "X-Build-Token: ${{ secrets.BUILD_TOKEN }}" \
            -d "{\"status\":\"READY\",\"artifact_url\":\"${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.event.inputs.semver }}\"}"

      - name: Notify Leonis — FAILED
        if: failure()
        run: |
          curl -s -X POST "${{ secrets.LEONIS_API_URL }}/api/v1/service-versions/${{ github.event.inputs.version_id }}/build-status" \
            -H "Content-Type: application/json" \
            -H "X-Build-Token: ${{ secrets.BUILD_TOKEN }}" \
            -d "{\"status\":\"FAILED\"}"
